ai_usage_summary: |
  Used Claude and Antigravity for code design, testing, and formatting.
  No candidate profile data was shared with any external APIs.

methodology_summary: |
  Multi-stage heuristic ranker with honeypot filtering. Combines candidate location
  alignment (relocation to Pune/Noida), role experience scoring (total years of
  experience matching target 5-9 band and AI/ML domain experience duration),
  and semantic keyword skill relevance. Rejection metrics catch impossible career
  timelines and anomalous education profiles. Multiplied by dynamic behavioral
  signals (open to work, response rate, login activity, and notice periods)
  to rank optimal active candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
